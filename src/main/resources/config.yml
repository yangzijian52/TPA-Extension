# ============================================================================
# TPAExtension 2.1.2 配置文件
# 适用环境：Paper 26.2 + Essentials，可选安装 Floodgate
# ============================================================================
#
# 【修改前必读】
# 1. 本文件必须保存为 UTF-8 编码，否则中文可能显示成乱码或问号。
# 2. YAML 只能使用空格缩进，禁止使用 Tab；建议保持现有的两空格缩进。
# 3. 修改完成后请完整重启服务器。不要使用 /reload，以免菜单或依赖状态异常。
# 4. 插件升级时不会覆盖服务器上已经存在的 config.yml。
#    如果需要获取新版完整注释，请先备份旧配置，再用 JAR 内的新配置替换。
#
# 【颜色代码】
# 支持 Minecraft 传统颜色代码，例如：
# &0 黑色  &1 深蓝  &2 深绿  &3 湖蓝  &4 深红  &5 紫色  &6 金色  &7 灰色
# &8 深灰  &9 蓝色  &a 绿色  &b 青色  &c 红色  &d 粉色  &e 黄色  &f 白色
# 常用格式：&l 粗体、&o 斜体、&n 下划线、&m 删除线、&r 重置格式。
#
# 【槽位编号】
# Java GUI 一共 54 格，编号为 0～53：
# - 0～44：在线玩家头像区域
# - 45：上一页按钮
# - 48：默认返回主菜单按钮
# - 49：页码及刷新按钮
# - 50：默认关闭菜单按钮
# - 53：下一页按钮
# 建议自定义按钮只使用底栏 45～53，避免覆盖玩家头像。
#
# 【材质名称】
# material 必须填写有效的 Paper 26.2 Material 英文名称，建议使用全大写，
# 例如 ARROW、BARRIER、NETHER_STAR。材质无效时插件会使用默认材质并记录警告。
#
# 【按钮动作】
# commands 中的动作会按照从上到下的顺序执行，目前支持：
# - "[command] 命令"：以点击菜单的玩家身份执行命令，通常不要填写开头的 /。
# - "[close]"：关闭当前菜单。
#
# 命令支持 {player} 占位符，执行时会替换为点击者的玩家名。
# 多动作示例：
# commands:
#   - "[close]"
#   - "[command] quickmenu open"
#
# 注意：玩家必须拥有目标命令所需的权限；插件不会绕过权限检查。

gui:
  # Java 版 TPA 玩家选择菜单的底栏按钮。
  buttons:
    # ------------------------------------------------------------------------
    # 返回主菜单按钮
    # 默认位于第 48 格，点击后以玩家身份执行 quickmenu open。
    # 如果服务器没有安装 QuickMenu，请把 commands 改成自己的主菜单命令。
    # ------------------------------------------------------------------------
    back:
      # 按钮所在槽位，有效范围为 0～53，推荐保持 48。
      slot: 48

      # 按钮图标材质，必须是有效的 Paper 26.2 Material。
      material: ARROW

      # 按钮显示名称，支持上方列出的 & 颜色和格式代码。
      name: "&a返回主菜单"

      # 鼠标悬停时显示的说明文字；不需要说明时可写 lore: []。
      lore:
        - "&7点击返回服务器主菜单"

      # 点击按钮后执行的动作，可按需修改命令或增加 [close]。
      commands:
        - "[command] quickmenu open"

    # ------------------------------------------------------------------------
    # 关闭菜单按钮
    # 默认位于第 50 格，点击后只关闭当前 TPA 菜单。
    # ------------------------------------------------------------------------
    close:
      # 按钮所在槽位，有效范围为 0～53，推荐保持 50。
      slot: 50

      # BARRIER 为红色禁止标志图标，也可改成其他有效材质。
      material: BARRIER

      # 按钮显示名称。
      name: "&c关闭菜单"

      # 空列表表示不显示额外说明文字。
      lore: []

      # [close] 只关闭当前菜单，不执行其他命令。
      commands:
        - "[close]"
